#paths/servico.yaml

paths:
  /services:
    get:
      summary: Listar  todos osserviços
      description: "Retorna uma lista de todos os serviços disponíveis."
      responses:
        '200':
          description: Lista de serviços 
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/servico'
        "400":
          description: Requisição inválida  
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/ResponseError'
  /services/create:
    post:
      summary: Criar um novo serviço
      description: "Cria um novo serviço com as informações fornecidas."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object