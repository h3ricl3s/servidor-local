paths:
  /propostas:
    get:
      tags:
        - Propostas
      summary: Listar propostas
      description: Retorna todas as propostas cadastradas.
      responses:
        "200":
          description: Lista de propostas retornada com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccessProposta"
        "500":
          description: Erro ao buscar propostas.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseErrorProposta"

  /propostas/create:
    post:
      tags:
        - Propostas
      summary: Criar proposta
      description: Cria uma nova proposta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposta"
      responses:
        "200":
          description: Proposta criada com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccessProposta"
        "400":
          description: Dados invalidos para criar proposta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseErrorProposta"

  /propostas/get-by-id/{id}:
    get:
      tags:
        - Propostas
      summary: Buscar proposta por ID
      description: Retorna uma proposta especifica pelo seu identificador.
      parameters:
        - in: path
          name: id
          required: true
          description: ID da proposta.
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Proposta encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccessProposta"
        "400":
          description: ID da proposta invalido ou ausente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseErrorProposta"
        "404":
          description: Proposta nao encontrada.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseErrorProposta"

  /propostas/update/{id}:
    put:
      tags:
        - Propostas
      summary: Atualizar proposta
      description: Atualiza as informacoes de uma proposta existente pelo seu ID.
      parameters:
        - in: path
          name: id
          required: true
          description: ID da proposta a ser atualizada.
          schema:
            type: integer
            example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProposta"
      responses:
        "200":
          description: Proposta atualizada com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccessProposta"
        "400":
          description: Dados invalidos para atualizar proposta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseErrorProposta"

  /propostas/delete/{id}:
    delete:
      tags:
        - Propostas
      summary: Apagar proposta
      description: Apaga uma proposta especificada pelo seu ID.
      parameters:
        - in: path
          name: id
          required: true
          description: ID da proposta a ser apagada.
          schema:
            type: integer
            example: 1
      responses:
        "200":
          description: Proposta apagada com sucesso.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseSuccessProposta"
        "400":
          description: Erro ao apagar proposta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResponseErrorProposta"
